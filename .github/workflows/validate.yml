name: Validate control portfolio

on:
  push:
  pull_request:

jobs:
  python-reference:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements.txt
      - name: Capture Ruff diagnostics
        shell: bash
        run: |
          set +e
          ruff check . --output-format=concise > ruff-report.txt 2>&1
          echo $? > ruff-exit-code.txt
          set -e
      - name: Upload Ruff diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: ruff-diagnostics-${{ matrix.python-version }}
          path: |
            ruff-report.txt
            ruff-exit-code.txt
      - name: Enforce Ruff result
        shell: bash
        run: test "$(cat ruff-exit-code.txt)" = "0"
      - run: ruff format --check .
      - run: pytest -q
      - run: python -m validation.generate_reference_figures --check-only
      - run: python -m validation.report --check
