name: Validate reference models

on:
  push:
  pull_request:

jobs:
  python-reference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pytest -q
      - run: python -m validation.generate_reference_figures --check-only
