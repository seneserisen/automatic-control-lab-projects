name: Validate control portfolio

on:
  push:
  pull_request:

jobs:
  python-reference:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest -q
      - run: python -m validation.generate_reference_figures --check-only
      - run: python -m validation.report --check
