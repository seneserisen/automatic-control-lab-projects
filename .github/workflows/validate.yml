name: Validate control portfolio

on:
  push:
  pull_request:

jobs:
  python-reference:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements.txt
      - name: Capture Ruff auto-fix diff
        shell: bash
        run: |
          ruff check --fix . > ruff-report.txt 2>&1 || true
          git diff -- validation/report.py validation/maglev_observer.py > ruff-fix.diff
      - name: Upload Ruff diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: ruff-fix-${{ matrix.python-version }}
          path: |
            ruff-report.txt
            ruff-fix.diff
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest -q
      - run: python -m validation.generate_reference_figures --check-only
      - run: python -m validation.report --check
